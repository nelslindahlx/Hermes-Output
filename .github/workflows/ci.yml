name: CI

on:
  push:
    branches: [main]
    paths:
      - "knowledgereduce/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "knowledgereduce/**"
      - ".github/workflows/ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    defaults:
      run:
        working-directory: knowledgereduce

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,model-reduce,graph]"

      - name: Run tests with coverage
        run: |
          pytest --cov=knowledge_graph_pkg --cov-report=term-missing

      - name: Evaluation gate (extraction F1 baseline)
        run: |
          knowledgereduce eval --gold data/gold_set.json
